name: build

on:
  push:
    tags: ['v*']
  workflow_dispatch:        # build distributables on demand (ad-hoc signed, no notarization)

permissions:
  contents: write   # needed to create a Release on tags

# Release builds (tag push) are signed with Developer ID + Hardened Runtime and
# notarized. Required repository secrets:
#   DEVELOPER_ID_CERT_P12_BASE64  base64 of the Developer ID Application .p12
#   DEVELOPER_ID_CERT_PASSWORD    the .p12 export password
#   AC_API_KEY_ID                 App Store Connect API Key ID
#   AC_API_ISSUER_ID              App Store Connect issuer ID (UUID)
#   AC_API_KEY_P8_BASE64          base64 of the App Store Connect .p8 key
# main/PR builds skip signing+notarization (ad-hoc) so they need no secrets.

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0          # build number = commit count

      - name: Show toolchain
        run: swiftc --version && sw_vers

      - name: Import Developer ID certificate (release only)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          CERT_P12_BASE64: ${{ secrets.DEVELOPER_ID_CERT_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/relayout.keychain-db"
          KP="$(uuidgen)"   # ephemeral keychain password
          security create-keychain -p "$KP" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KP" "$KEYCHAIN"
          printf '%s' "$CERT_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -P "$CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KP" "$KEYCHAIN" >/dev/null
          HASH="$(security find-identity -v -p codesigning "$KEYCHAIN" | grep 'Developer ID Application' | head -1 | awk '{print $2}')"
          echo "::add-mask::$HASH"
          echo "SIGN_IDENTITY=$HASH" >> "$GITHUB_ENV"
          rm -f "$RUNNER_TEMP/cert.p12"

      - name: Build
        env:
          # CI always packages the release-named ReLayout.app (never the "(dev)"
          # variant) so make-dmg.sh / packaging find dist/ReLayout.app — both on
          # tag pushes and manual workflow_dispatch runs.
          RELAYOUT_RELEASE: '1'
          # embed Sparkle only for tag releases; dispatch builds stay framework-free
          WITH_SPARKLE: ${{ startsWith(github.ref, 'refs/tags/v') && '1' || '0' }}
        run: ./scripts/build.sh            # signs with $SIGN_IDENTITY if set, else ad-hoc

      - name: Test
        run: ./scripts/run-tests.sh

      - name: Notarize + staple (release only)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          AC_API_KEY_ID: ${{ secrets.AC_API_KEY_ID }}
          AC_API_ISSUER_ID: ${{ secrets.AC_API_ISSUER_ID }}
          AC_API_KEY_P8_BASE64: ${{ secrets.AC_API_KEY_P8_BASE64 }}
        run: |
          set -euo pipefail
          printf '%s' "$AC_API_KEY_P8_BASE64" | base64 --decode > "$RUNNER_TEMP/ac.p8"
          export AC_API_KEY_PATH="$RUNNER_TEMP/ac.p8"
          ditto -c -k --keepParent dist/ReLayout.app "$RUNNER_TEMP/notarize.zip"
          ./scripts/notarize.sh "$RUNNER_TEMP/notarize.zip" dist/ReLayout.app   # staple the app
          rm -f "$RUNNER_TEMP/ac.p8"

      - name: Package (zip + dmg)
        run: |
          set -euo pipefail
          ditto -c -k --keepParent dist/ReLayout.app dist/reLayout.zip   # contains the stapled app
          ./scripts/make-dmg.sh

      - name: Notarize + staple DMG (release only)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          AC_API_KEY_ID: ${{ secrets.AC_API_KEY_ID }}
          AC_API_ISSUER_ID: ${{ secrets.AC_API_ISSUER_ID }}
          AC_API_KEY_P8_BASE64: ${{ secrets.AC_API_KEY_P8_BASE64 }}
        run: |
          set -euo pipefail
          printf '%s' "$AC_API_KEY_P8_BASE64" | base64 --decode > "$RUNNER_TEMP/ac.p8"
          export AC_API_KEY_PATH="$RUNNER_TEMP/ac.p8"
          ./scripts/notarize.sh dist/reLayout.dmg   # submit + staple the dmg itself (offline first-mount)
          rm -f "$RUNNER_TEMP/ac.p8"

      - name: Upload distributables (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch'
        # upload-artifact@v4 is a Node-20 JS action (deprecated 2026-06-16);
        # run it on Node 24 so it keeps working past the cutoff.
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
        uses: actions/upload-artifact@v4
        with:
          name: relayout-dist
          path: |
            dist/reLayout.dmg
            dist/reLayout.zip
          if-no-files-found: error

      - name: Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" dist/reLayout.dmg dist/reLayout.zip \
            --title "${GITHUB_REF_NAME}" --generate-notes

      - name: Publish Sparkle appcast to GitHub Pages (release only)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${SPARKLE_ED_PRIVATE_KEY:-}" ]; then
            echo "SPARKLE_ED_PRIVATE_KEY unset — skipping appcast"; exit 0
          fi
          GEN="$(ls .sparkle/*/bin/generate_appcast | head -1)"
          printf '%s' "$SPARKLE_ED_PRIVATE_KEY" > "$RUNNER_TEMP/ed_priv"
          SRC="$RUNNER_TEMP/appcast-src"; mkdir -p "$SRC"; cp dist/reLayout.zip "$SRC/"
          "$GEN" --ed-key-file "$RUNNER_TEMP/ed_priv" \
            --download-url-prefix "https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/" \
            "$SRC"
          OUT="$RUNNER_TEMP/pages"
          git clone --depth 1 --branch gh-pages \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "$OUT" 2>/dev/null || {
              git clone --depth 1 "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "$OUT"
              ( cd "$OUT" && git checkout --orphan gh-pages && git rm -rf . >/dev/null 2>&1 || true )
            }
          cp "$SRC/appcast.xml" "$OUT/appcast.xml"
          ( cd "$OUT"
            git add appcast.xml
            git -c user.name=relayout-ci -c user.email=ci@users.noreply.github.com \
              commit -m "appcast ${GITHUB_REF_NAME}" || { echo "no change"; exit 0; }
            git push origin gh-pages )

      - name: Update Homebrew tap (release only)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          TAP_DEPLOY_KEY: ${{ secrets.TAP_DEPLOY_KEY }}   # SSH deploy key (write) on homebrew-relayout
        run: ./packaging/homebrew/update-cask.sh "${GITHUB_REF_NAME#v}" dist/reLayout.dmg

  # Windows distributables for x64 and arm64. Each arch builds natively on its
  # own runner (cross-compiling the Swift Windows toolchain is not supported),
  # so no QEMU/cross SDK. The app imports WinSDK, whose Swift overlay
  # (swiftWinSDK) ships dynamic-only, so a truly dependency-free single exe is
  # not possible — both outputs below bundle the Swift runtime DLLs:
  #   * portable single .exe — a 7-Zip self-extracting archive (unpacks to a
  #     temp dir and launches ReLayoutWin.exe). One file, download and run.
  #   * Inno Setup installer (setup.exe) — per-user install, Start Menu +
  #     Startup shortcut, uninstaller.
  build-windows:
    # Windows is frozen: build on manual dispatch only, NOT on tag releases.
    if: github.event_name == 'workflow_dispatch'
    needs: build            # macOS job creates the GitHub Release on tag; wait so release-upload below finds it
    strategy:
      fail-fast: false      # don't kill arm64 if x64 fails, and vice-versa
      matrix:
        include:
          # x64 builds clean on 6.1. arm64 needs >=6.3: on 6.1 the native arm64
          # toolchain can't import the WinSDK module — clang's intrinsics modules
          # (arm64intr.h / arm_acle.h) collide with the Windows SDK's aarch64
          # intrinsics. Fixed in later toolchains, so pin arm64 to 6.3.2.
          - { arch: x64,   runner: windows-latest,  build_arch: amd64, swift_version: swift-6.1-release,   swift_build: 6.1-RELEASE,   iss_arch: x64compatible }
          - { arch: arm64, runner: windows-11-arm,   build_arch: arm64, swift_version: swift-6.3.2-release, swift_build: 6.3.2-RELEASE, iss_arch: arm64 }
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v5

      - name: Install Swift toolchain
        uses: compnerd/gha-setup-swift@main
        with:
          swift-version: ${{ matrix.swift_version }}
          swift-build: ${{ matrix.swift_build }}
          build_arch: ${{ matrix.build_arch }}   # native arm64 toolchain on the arm runner (else it installs amd64 and emits x86_64)

      - name: Show toolchain
        run: swift --version

      - name: Build (release)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          # Compile the icon resource (llvm-rc ships with the Swift toolchain) and
          # link it into the exe so Explorer/tray/Settings show the app icon.
          # Stamp the version shown in Settings/About (tag -> release version,
          # otherwise a dev marker). Overwrites the committed default.
          $ver = '${{ github.ref_name }}' -replace '^v',''
          if ('${{ github.event_name }}' -ne 'push') { $ver = '0.0.0-dev' }
          "// Generated by CI.`nlet appVersion = `"$ver`"`n" | Set-Content -Encoding utf8 windows/Version.swift

          Push-Location windows
          & llvm-rc /FO "$PWD\..\relayout.res" relayout.rc
          if ($LASTEXITCODE -ne 0) { throw "llvm-rc failed ($LASTEXITCODE)" }
          Pop-Location
          swift build -c release --product ReLayoutWin -Xlinker "$((Resolve-Path relayout.res).Path)"

      - name: Stage payload (exe + Swift runtime DLLs)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $arch    = '${{ matrix.arch }}'
          $payload = "dist/payload-$arch"
          New-Item -ItemType Directory -Force -Path $payload | Out-Null

          $built = Get-ChildItem -Recurse -Path .build -Filter 'ReLayoutWin.exe' |
                   Where-Object { $_.FullName -match '\\release\\' } | Select-Object -First 1
          if (-not $built) { throw 'ReLayoutWin.exe not found under .build' }
          Copy-Item $built.FullName $payload

          # Bundle the Swift runtime DLLs the exe links: find the PATH entry that
          # holds swiftCore.dll (the toolchain Runtimes bin) and copy its DLLs.
          $rt = ($env:PATH -split ';' | Where-Object {
                   $_ -and (Test-Path (Join-Path $_ 'swiftCore.dll')) } | Select-Object -First 1)
          if (-not $rt) { throw 'swiftCore.dll not found on PATH — cannot bundle runtime' }
          Copy-Item (Join-Path $rt '*.dll') $payload
          Write-Host "payload: $((Get-ChildItem $payload).Count) files"

      - name: Build portable self-extracting exe (7-Zip SFX)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $arch    = '${{ matrix.arch }}'
          $payload = "dist/payload-$arch"

          # 7-Zip ships an SFX stub (7z.sfx) that reads a leading config block and
          # auto-runs a program after extracting to a temp dir. Concatenate:
          #   stub + config + archive  ->  one self-running .exe
          $sevenZip = Get-ChildItem 'C:\Program Files\7-Zip\7z.exe',
                                    'C:\Program Files (x86)\7-Zip\7z.exe' -ErrorAction SilentlyContinue |
                      Select-Object -First 1
          if (-not $sevenZip) { choco install 7zip -y --no-progress | Out-Null
            $sevenZip = Get-ChildItem 'C:\Program Files\7-Zip\7z.exe' -ErrorAction SilentlyContinue | Select-Object -First 1 }
          if (-not $sevenZip) { throw '7z.exe not found' }
          $sfx = Join-Path (Split-Path $sevenZip.FullName) '7z.sfx'
          if (-not (Test-Path $sfx)) { throw "7z.sfx stub not found next to 7z.exe" }

          $arc = "dist/payload-$arch.7z"
          if (Test-Path $arc) { Remove-Item $arc }
          & $sevenZip.FullName a -t7z $arc "$payload\*" | Out-Null

          $cfg = "dist/sfx-$arch.txt"
          ";!@Install@!UTF-8!`r`nRunProgram=`"ReLayoutWin.exe`"`r`n;!@InstallEnd@!`r`n" |
            Set-Content -Path $cfg -NoNewline -Encoding utf8

          $portable = Join-Path $PWD "dist/reLayout-windows-$arch.exe"
          # Concatenate full paths in order (stub is absolute; cfg/arc are cwd-relative).
          $parts = @($sfx, (Resolve-Path $cfg).Path, (Resolve-Path $arc).Path)
          $fs = [System.IO.File]::Create($portable)
          foreach ($part in $parts) {
            $bytes = [System.IO.File]::ReadAllBytes($part)
            $fs.Write($bytes, 0, $bytes.Length)
          }
          $fs.Close()
          '{0}  {1:N0} bytes' -f (Split-Path $portable -Leaf), (Get-Item $portable).Length | Write-Host

      - name: Build installer (Inno Setup)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $arch = '${{ matrix.arch }}'
          choco install innosetup -y --no-progress | Out-Null
          $iscc = Get-ChildItem 'C:\Program Files (x86)\Inno Setup 6\ISCC.exe',
                                 'C:\Program Files\Inno Setup 6\ISCC.exe' -ErrorAction SilentlyContinue |
                  Select-Object -First 1
          if (-not $iscc) { throw 'ISCC.exe (Inno Setup) not found after install' }

          $ver = '${{ github.ref_name }}' -replace '^v',''
          if ('${{ github.event_name }}' -ne 'push') { $ver = '0.0.0-dev' }

          & $iscc.FullName `
            "/DAppVer=$ver" `
            "/DSrcDir=$(Resolve-Path "dist/payload-$arch")" `
            "/DOutDir=$(Resolve-Path dist)" `
            "/DOutBase=reLayout-windows-$arch-setup" `
            "/DArchAllowed=${{ matrix.iss_arch }}" `
            "/DArch64=${{ matrix.iss_arch }}" `
            packaging/windows/relayout.iss
          if ($LASTEXITCODE -ne 0) { throw "ISCC failed ($LASTEXITCODE)" }
          Get-ChildItem dist -Filter '*setup.exe' | Select-Object Name,Length | Format-Table -Auto | Out-String | Write-Host

      - name: Upload distributable artifacts
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
        uses: actions/upload-artifact@v4
        with:
          name: relayout-windows-${{ matrix.arch }}
          path: |
            dist/reLayout-windows-${{ matrix.arch }}.exe
            dist/reLayout-windows-${{ matrix.arch }}-setup.exe
          if-no-files-found: error

      - name: Attach to Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" \
            "dist/reLayout-windows-${{ matrix.arch }}.exe" \
            "dist/reLayout-windows-${{ matrix.arch }}-setup.exe" --clobber
