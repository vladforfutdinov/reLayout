name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

permissions:
  contents: write   # needed to create a Release on tags

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # run JS actions on Node 24 (Node 20 deprecated)

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # build number = commit count

      - name: Show toolchain
        run: swiftc --version && sw_vers

      - name: Build
        env:
          # on a tag push, version comes from the tag (v1.2.3 -> 1.2.3); else VERSION file
          RELAYOUT_VERSION: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}
        run: ./build.sh           # ad-hoc signs (no self-signed identity on CI)

      - name: Package
        run: ditto -c -k --keepParent ReLayout.app reLayout.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: reLayout-app
          path: reLayout.zip

      - name: Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: reLayout.zip
